name: m2-clase2

services:
  app:
    build: .
    expose:
      - "8000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: firulais
      DB_USER: firulais
      DB_PASSWORD: firulais
      DEMO_CPU_WORK: 20000
    depends_on:
      db:
        condition: service_healthy
    cpus: 0.5
    mem_limit: 256m

  db:
    image: mysql:8.4
    container_name: firulais-db
    expose:
      - "3306"
    environment:
      MYSQL_DATABASE: firulais
      MYSQL_USER: firulais
      MYSQL_PASSWORD: firulais
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u firulais -pfirulais --silent"]
      interval: 5s
      timeout: 5s
      retries: 10
    cpus: 0.5
    mem_limit: 512m

  nginx:
    image: nginx:alpine
    container_name: firulais-lb
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: firulais-cadvisor
    command:
      - "--docker_only=true"
      - "--store_container_labels=false"
      - "--whitelisted_container_labels=com.docker.compose.project,com.docker.compose.service,com.docker.compose.container-number"
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.16.0
    container_name: firulais-mysqld-exporter
    ports:
      - "9104:9104"
    command:
      - "--mysqld.address=db:3306"
      - "--mysqld.username=firulais"
    environment:
      MYSQLD_EXPORTER_PASSWORD: firulais
    depends_on:
      db:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: firulais-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - cadvisor
      - mysqld-exporter

  grafana:
    image: grafana/grafana:11.3.0
    container_name: firulais-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  autoscaler:
    build:
      context: .
      dockerfile: Dockerfile.autoscaler
    container_name: firulais-autoscaler
    profiles:
      - autoscaling
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      COMPOSE_PROJECT_NAME: m2-clase2
      MIN_REPLICAS: ${MIN_REPLICAS:-1}
      MAX_REPLICAS: ${MAX_REPLICAS:-6}
      SCALE_UP_CPU: ${SCALE_UP_CPU:-0.35}
      SCALE_DOWN_CPU: ${SCALE_DOWN_CPU:-0.08}
      SCALE_UP_MEMORY_MB: ${SCALE_UP_MEMORY_MB:-180}
      SCALE_DOWN_MEMORY_MB: ${SCALE_DOWN_MEMORY_MB:-90}
      INTERVAL_SECONDS: ${INTERVAL_SECONDS:-10}
      COOLDOWN_SECONDS: ${COOLDOWN_SECONDS:-20}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace
    depends_on:
      - prometheus

  k6-read:
    image: grafana/k6:0.54.0
    profiles:
      - k6
    environment:
      BASE_URL: http://nginx
      K6_PROMETHEUS_RW_SERVER_URL: http://prometheus:9090/api/v1/write
      K6_PROMETHEUS_RW_TREND_STATS: p(95),avg,max
    volumes:
      - ./k6:/k6:ro
    command: ["run", "-o", "experimental-prometheus-rw", "/k6/carga-read.js"]

  k6-mixed:
    image: grafana/k6:0.54.0
    profiles:
      - k6
    environment:
      BASE_URL: http://nginx
      K6_PROMETHEUS_RW_SERVER_URL: http://prometheus:9090/api/v1/write
      K6_PROMETHEUS_RW_TREND_STATS: p(95),avg,max
    volumes:
      - ./k6:/k6:ro
    command: ["run", "-o", "experimental-prometheus-rw", "/k6/carga-mixta.js"]

  k6-stress:
    image: grafana/k6:0.54.0
    profiles:
      - k6
    environment:
      BASE_URL: http://nginx
      K6_PROMETHEUS_RW_SERVER_URL: http://prometheus:9090/api/v1/write
      K6_PROMETHEUS_RW_TREND_STATS: p(95),avg,max
    volumes:
      - ./k6:/k6:ro
    command: ["run", "-o", "experimental-prometheus-rw", "/k6/carga-stress.js"]

  k6-peak:
    image: grafana/k6:0.54.0
    profiles:
      - k6
    environment:
      BASE_URL: http://nginx
      K6_PROMETHEUS_RW_SERVER_URL: http://prometheus:9090/api/v1/write
      K6_PROMETHEUS_RW_TREND_STATS: p(95),avg,max
    volumes:
      - ./k6:/k6:ro
    command: ["run", "-o", "experimental-prometheus-rw", "/k6/carga-pico-9am.js"]

volumes:
  mysql_data:
  prometheus_data:
  grafana_data:
